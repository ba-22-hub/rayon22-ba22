name: Build image & send to Scaleway

on:
  push:
    branches:
      - release

env:
  REGISTRY: rg.fr-par.scw.cloud
  IMAGE: rg.fr-par.scw.cloud/rayon22-namespace/rayon22-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # On copie le code source dans le runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # On configure Docker Buildx (Pour l'utiliser dans le runner)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # On se connecte au registre Scaleway
      - name: Login to Scaleway registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SCW_REGISTRY_USERNAME }}
          password: ${{ secrets.SCW_REGISTRY_PASSWORD }}

      # On build et push l'image Docker
      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:v${{ github.run_number }}
            ${{ env.IMAGE }}:latest

      - name: Print pushed tags
        run: |
          echo "Pushed: ${{ env.IMAGE }}:v${{ github.run_number }} and ${{ env.IMAGE }}:latest"